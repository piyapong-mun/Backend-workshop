name: Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:

  build:
    # Runner
    runs-on: ubuntu-latest

    environment: AWS

    # Step
    steps:
    # Action
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.3'

    - name: Set up app.env
      run: |
        echo "DB_DRIVER='${{ secrets.DB_DRIVER }}'" > app.env
        echo "DB_SOURCE='${{ secrets.DB_SOURCE }}'" >> app.env
        echo "SERVER_ADDRESS='${{ secrets.SERVER_ADDRESS }}'" >> app.env
        echo "SECRET_KEY='${{ secrets.SECRET_KEY }}'" >> app.env
        echo "TOKEN_DURATION='${{ secrets.TOKEN_DURATION }}'" >> app.env

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: github/simple-bank
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

    - name: Set up kube config
     run: |
       aws eks update-kubeconfig --region ap-southeast-2 --name simplebank-cluster

    - name: Deploy to EKS
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
        kubectl apply -f ingress.yaml
        kubectl apply -f issuer.yaml
        kubectl apply -f aws-auth.yaml
